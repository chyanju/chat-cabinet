<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Cabinet</title>
<link rel="icon" type="image/svg+xml" href="cabinet.svg">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div id="app">
  <!-- Sidebar: session list -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <h1><img src="cabinet.svg" alt="" class="sidebar-icon">Chat Cabinet</h1>
      <button id="refreshBtn" title="Refresh">↻</button>
    </div>
    <input id="searchBox" type="text" placeholder="Search sessions…">
    <div id="sourceFilter" class="source-filter">
      <div class="filter-label">Source</div>
      <div id="sourceChips" class="filter-chips"></div>
    </div>
    <ul id="sessionList"></ul>
  </aside>

  <!-- Main: session detail -->
  <main id="detail">
    <div id="placeholder">
      <div class="placeholder-icon"><img src="cabinet.svg" alt="Chat Cabinet" style="width:64px;height:64px;opacity:0.5"></div>
      <p>Select a session from the sidebar to view</p>
    </div>
    <div id="sessionDetail" class="hidden">
      <header id="sessionHeader"></header>
      <div id="exportBar" class="hidden">
        <button id="exportCfgBtn" title="Export options">Export ▾</button>
      </div>
      <div id="exportPanel" class="hidden">
        <div class="export-panel-title">Export Options</div>
        <label><input type="checkbox" id="expUserMsg" checked> User messages</label>
        <label><input type="checkbox" id="expAssistantMsg" checked> Assistant messages</label>
        <label><input type="checkbox" id="expToolCalls" checked> Tool calls (commands)</label>
        <label><input type="checkbox" id="expToolOutput"> Tool output</label>
        <label><input type="checkbox" id="expReasoning"> Reasoning</label>
        <label><input type="checkbox" id="expSystemPrompt"> System prompt (full)</label>
        <label><input type="checkbox" id="expEvents"> Events (task_started, etc.)</label>
        <label><input type="checkbox" id="expTimestamps" checked> Timestamps</label>
        <div class="export-panel-actions">
          <button id="exportMd">Download .md</button>
          <button id="exportTxt">Download .txt</button>
        </div>
      </div>
      <div id="conversation"></div>
    </div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
