<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Cabinet</title>
<link rel="icon" type="image/svg+xml" href="cabinet.svg">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div id="app">
  <!-- Row 1: Menu Bar -->
  <div id="menubar"></div>

  <!-- Row 2, Col 1: Activity Bar -->
  <div id="activity-bar"></div>

  <!-- Row 2, Col 2: Sidebar (session list) -->
  <aside id="sidebar">
    <div class="search-wrap">
      <div class="search-input-wrap">
        <input id="searchBox" type="text" placeholder="Search sessions…">
        <button id="searchClear" class="search-clear hidden" title="Clear">&times;</button>
      </div>
      <button id="refreshBtn" title="Refresh sessions">&#x21bb;</button>
    </div>
    <div id="sourceFilter" class="source-filter">
      <div class="filter-label">Source</div>
      <div id="sourceChips" class="filter-chips"></div>
    </div>
    <ul id="sessionList"></ul>
  </aside>

  <!-- Row 2, Col 3: Editor Area (tabs + content) -->
  <div id="editor-area">
    <div id="tab-bar"></div>
    <div id="editor-content">
      <div id="placeholder">
        <div class="placeholder-icon"><img src="cabinet.svg" alt="Chat Cabinet" style="width:64px;height:64px;opacity:0.5"></div>
        <p>Select a session from the sidebar to view</p>
      </div>
      <div id="sessionDetail" class="hidden">
        <div id="conversation"></div>
      </div>
    </div>
  </div>

  <!-- Row 2, Col 4: Detail Panel -->
  <div id="detail-panel"></div>

  <!-- Row 3: Status Bar -->
  <div id="statusbar"></div>
</div>

<script src="app.js" type="module"></script>
</body>
</html>
